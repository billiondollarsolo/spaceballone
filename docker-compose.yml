services:
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    ports:
      - "8080:8080"
    environment:
      - SPACEBALLONE_MASTER_KEY=${SPACEBALLONE_MASTER_KEY}
      - DATABASE_URL=${DATABASE_URL:-postgres://spaceballone:${POSTGRES_PASSWORD:-spaceballone}@db:5432/spaceballone?sslmode=disable}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
      - PORT=8080
      - SESSION_EXPIRY=${SESSION_EXPIRY:-24h}
      - HEARTBEAT_INTERVAL=${HEARTBEAT_INTERVAL:-30s}
      - TLS_CERT_PATH=${TLS_CERT_PATH:-}
      - TLS_KEY_PATH=${TLS_KEY_PATH:-}
    volumes:
      - api-data:/data
    depends_on:
      - db
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    ports:
      - "3000:3000"
    environment:
      - API_URL=http://api:8080
    depends_on:
      - api
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=spaceballone
      - POSTGRES_USER=spaceballone
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-spaceballone}
    volumes:
      - db-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped

volumes:
  api-data:
  db-data:
