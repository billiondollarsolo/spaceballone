services:
  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    environment:
      - DOMAIN=${DOMAIN:-localhost}
    volumes:
      - ./docker/Caddyfile:/etc/caddy/Caddyfile
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - api
      - frontend
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    environment:
      - SPACEBALLONE_MASTER_KEY=${SPACEBALLONE_MASTER_KEY}
      - DATABASE_URL=${DATABASE_URL:-postgres://spaceballone:${POSTGRES_PASSWORD:-spaceballone}@db:5432/spaceballone?sslmode=disable}
      - FRONTEND_URL=${FRONTEND_URL:-https://${DOMAIN:-localhost}}
      - PORT=8080
      - SESSION_EXPIRY=${SESSION_EXPIRY:-24h}
      - HEARTBEAT_INTERVAL=${HEARTBEAT_INTERVAL:-30s}
    depends_on:
      - db
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    environment:
      - API_URL=http://api:8080
    depends_on:
      - api
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=spaceballone
      - POSTGRES_USER=spaceballone
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-spaceballone}
    volumes:
      - db-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped

  # Optional: Cloudflare Tunnel for access without port forwarding
  # Enable with: docker compose --profile tunnel up
  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - caddy
    restart: unless-stopped
    profiles:
      - tunnel

volumes:
  caddy-data:
  caddy-config:
  db-data:
